# https://help.github.com/github/administering-a-repository/configuration-options-for-dependency-updates

version: 2
updates:
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'weekly'
    target-branch: 'main'
    commit-message:
      prefix: 'deps'
    open-pull-requests-limit: 20
  - package-ecosystem: 'cargo'
    directory: '/src-tauri'
    schedule:
      interval: 'weekly'
    target-branch: 'main'
    commit-message:
      prefix: 'deps'
    open-pull-requests-limit: 10
